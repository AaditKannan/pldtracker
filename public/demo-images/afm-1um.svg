<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <filter id="grain1">
      <feTurbulence type="fractalNoise" baseFrequency="0.15" numOctaves="7" seed="19" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feComponentTransfer in="grayNoise" result="mappedNoise">
        <feFuncR type="table" tableValues="0.25 0.38 0.55 0.70 0.85"/>
        <feFuncG type="table" tableValues="0.14 0.30 0.44 0.52 0.60"/>
        <feFuncB type="table" tableValues="0.06 0.11 0.15 0.18 0.22"/>
      </feComponentTransfer>
    </filter>
  </defs>
