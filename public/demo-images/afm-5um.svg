  <circle cx="32" cy="140" r="10" fill="#d4b038" opacity="0.35"/>
  <circle cx="145" cy="110" r="8" fill="#7a5c1a" opacity="0.5"/>
  <circle cx="88" cy="165" r="13" fill="#c09820" opacity="0.4"/>
  <circle cx="200" cy="150" r="7" fill="#a88020" opacity="0.55"/>
  <circle cx="55" cy="200" r="9" fill="#b08818" opacity="0.45"/>
  <circle cx="130" cy="185" r="11" fill="#8a6a18" opacity="0.5"/>
  <circle cx="170" cy="200" r="8" fill="#d0a830" opacity="0.4"/>
  <circle cx="220" cy="180" r="10" fill="#6a4c10" opacity="0.45"/>
  <circle cx="98" cy="230" r="6" fill="#c4a028" opacity="0.5"/>
  <circle cx="160" cy="140" r="14" fill="#9a7820" opacity="0.3"/>
  <circle cx="25" cy="75" r="10" fill="#b49028" opacity="0.4"/>
