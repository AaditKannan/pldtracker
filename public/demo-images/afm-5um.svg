  <circle cx="38" cy="48" r="5" fill="#d8b840" opacity="0.6"/>
  <circle cx="225" cy="55" r="6" fill="#c0a038" opacity="0.5"/>
  <circle cx="108" cy="148" r="10" fill="#6e5010" opacity="0.45"/>
  <circle cx="72" cy="48" r="6" fill="#b89828" opacity="0.55"/>
  <circle cx="188" cy="108" r="9" fill="#a28020" opacity="0.4"/>
  <!-- Additional smaller grains -->
  <rect x="60" y="70" width="5" height="4" rx="2" fill="#c8a430" opacity="0.5" transform="rotate(15 62 72)"/>
  <rect x="140" y="90" width="6" height="5" rx="2" fill="#8a6818" opacity="0.45" transform="rotate(-20 143 92)"/>
