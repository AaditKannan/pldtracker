<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="heightCmap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c840"/>
      <stop offset="50%" stop-color="#a0712a"/>
      <stop offset="100%" stop-color="#5a3a18"/>
    </linearGradient>
    <filter id="grain5">
      <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="6" seed="42" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feComponentTransfer in="grayNoise" result="mappedNoise">
        <feFuncR type="table" tableValues="0.22 0.35 0.55 0.72 0.88"/>
        <feFuncG type="table" tableValues="0.12 0.28 0.44 0.55 0.62"/>
        <feFuncB type="table" tableValues="0.06 0.10 0.14 0.18 0.22"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="256" height="256" fill="#1a1d27"/>
  <!-- Simulated grain texture via noise filter -->
  <rect width="256" height="256" filter="url(#grain5)" opacity="0.95"/>
  <!-- Grain-like circles with varying brown-yellow tones -->
  <circle cx="45" cy="38" r="8" fill="#8b6914" opacity="0.5"/>
  <circle cx="112" cy="55" r="11" fill="#a07828" opacity="0.45"/>
  <circle cx="78" cy="92" r="7" fill="#c8a030" opacity="0.55"/>
